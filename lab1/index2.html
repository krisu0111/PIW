<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top">
        <h1>Durne Gierki</h1>
        <nav>
            <button>Wstecz</button>
        </nav>
    </header>

    <div class="main-container">
        <main style="padding: 10px; margin: 0 auto; width: 450px">
            <h2 style="padding: 10px">Dodaj nową grę planszową</h2>
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <label>Nazwa gry: <input type="text"></label>
                <label style="display: flex; flex-direction: column;">Opis szczegółowy: <textarea rows="5"></textarea></label>
                <label>Cena: <input type="number"></label>
                <label>Wydawnictwo: <input type="text"></label>
                <label>Dodaj zdjęcie: <input type="file"></label>
                <button>Zapisz pozycję</button>
            </form>
        </main>
    </div>
</body>
</html>
